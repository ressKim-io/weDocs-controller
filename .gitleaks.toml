# gitleaks 오탐 억제 — 표준: .claude/rules/secure-coding.md · plan: docs/plans/2026-07-17-gitleaks-false-positive-baseline.md
#
# 원칙:
#  1. fingerprint(.gitleaksignore) 금지 — `<commit>:<path>:<rule>:<line>` 구조라
#     squash 머지가 SHA를 재작성하면 즉시 무효화된다(backend PR #7 실증: PR green → main red).
#  2. 경로 통째 허용(blanket) 금지 — condition="AND"로 경로 + 값까지 좁힌다.
#     그 파일에 진짜 시크릿이 들어오면 반드시 잡혀야 한다.
#  3. 신규 엔트리는 "왜 오탐인가"를 1줄로 남긴다. 억제는 리뷰 대상이다.
#
# 검증(gitleaks 8.24.3 = CI의 action@v3가 해소하는 버전):
#   gitleaks detect --redact -v --exit-code=2
# 대조군으로 룰이 죽지 않았음을 확인 — `.claude/` 안의 진짜 generic key는 여전히 발화한다.

[extend]
useDefault = true

# `targetRules`(8.25.0 신설)는 CI 버전(8.24.3)에 없다 → 룰 재선언으로 스코프.
# 미지정 속성(regex/entropy/keywords)은 기본 룰에서 상속된다(실측 확인).
[[rules]]
id = "generic-api-key"

[[rules.allowlists]]
description = "`.claude/` 문서의 교육용 예시·산문 — 실제 시크릿 아님"
condition = "AND"
paths = ['''^\.claude/''']
regexes = [
  # gitops-reviewer.md: base64("password123"). "base64 ≠ 암호화"를 보여주려고 일부러 넣은 가짜.
  '''^cGFzc3dvcmQxMjM=$''',
  # istio-core.md: "Access Log: ztunnel/waypoint 레벨" — 산문.
  # `access` 키워드 + 엔트로피 3.58이 임계 3.5를 간신히 넘겨 매칭됐다.
  '''^ztunnel/waypoint$''',
]

# 문서가 PEM 마커를 "인용"하면 오탐이 난다 — private-key 룰은
# `BEGIN…PRIVATE KEY-----` + 64자 이상 + `KEY-----` 구조라, 마커 2개가 떨어져 인용되면
# 그 사이의 산문이 통째로 "키 본문"으로 잡힌다. (이 트랩을 설명하는 문서 자신이 걸렸다.)
[[rules]]
id = "private-key"

[[rules.allowlists]]
description = "docs/·.claude/ 산문의 PEM 마커 인용 — 마커 사이가 문서 텍스트면 키 본문이 아니다"
condition = "AND"
paths = ['''^(docs|\.claude)/.*\.md$''']
# 판별식: 마커 직후 200자 안에 백틱/표 파이프가 있으면 산문.
# 실제 PEM 본문은 개행 뒤 순수 base64라 백틱·파이프가 나올 수 없다 → 진짜 키는 그대로 발화한다.
regexes = ['''-----BEGIN [A-Z ]*PRIVATE KEY-----[\s\S]{0,200}?[`|]''']
